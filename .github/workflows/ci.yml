name: ci

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

permissions:
  contents: read

jobs:
  build-test:
    name: build + test
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-go@v5
        with:
          go-version: '1.22'
          cache: true

      - name: go mod download
        run: go mod download

      - name: build
        run: make build

      - name: smoke check binary
        run: |
          ./bin/aforo-loadgen --help
          ./bin/aforo-loadgen version

      - name: test
        run: make test

  lint:
    name: golangci-lint
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-go@v5
        with:
          go-version: '1.22'
          cache: true

      - uses: golangci/golangci-lint-action@v6
        with:
          version: v1.64.5
          args: --timeout=5m
