name: ci

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

permissions:
  contents: read

jobs:
  build-test:
    name: build + test
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-go@v5
        with:
          go-version: '1.22'
          cache: true

      - name: go mod download
        run: go mod download

      - name: build
        run: make build

      - name: smoke check binary
        run: |
          ./bin/aforo-loadgen --help
          ./bin/aforo-loadgen version

      - name: test
        run: make test

  # contract-test: validates loadgen's request/response Go structs against
  # the committed OpenAPI snapshots under openapi/. Separated from the
  # main build-test job because failures here are usually backend-side
  # renames that need a snapshot refresh (`make sync-openapi`) +
  # a coordinated loadgen update. Surfacing the failure on its own job
  # tab makes the right action (review the snapshot diff, then update
  # the loadgen struct) obvious to a PR author who otherwise sees a
  # generic "tests failed" badge.
  #
  # No docker stack required at CI time — uses the committed snapshots.
  # The snapshots are refreshed manually by a maintainer running
  # `make sync-openapi` against a live local docker-compose stack.
  contract-test:
    name: backend contract test
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-go@v5
        with:
          go-version: '1.22'
          cache: true

      - name: go mod download
        run: go mod download

      - name: contract test (loadgen ↔ backend OpenAPI snapshot)
        run: make contract-test

  lint:
    name: golangci-lint
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-go@v5
        with:
          go-version: '1.22'
          cache: true

      - uses: golangci/golangci-lint-action@v6
        with:
          version: v1.64.5
          args: --timeout=5m

  # Goreleaser dry-run — validates .goreleaser.yaml + the cross-compile
  # matrix on every PR. Catches a malformed config or a broken ldflags
  # pattern before tag-time, when fixing it requires re-tagging. Does not
  # publish (that is `release: true` only on the release.yml workflow).
  goreleaser-check:
    name: goreleaser check
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0   # goreleaser snapshots want full history

      - uses: actions/setup-go@v5
        with:
          go-version: '1.22'
          cache: true

      - name: goreleaser check (config validation)
        uses: goreleaser/goreleaser-action@v7
        with:
          distribution: goreleaser
          version: 'v2.9.0'
          args: check

      - name: goreleaser snapshot (cross-compile dry run, no publish)
        uses: goreleaser/goreleaser-action@v7
        with:
          distribution: goreleaser
          version: 'v2.9.0'
          args: release --snapshot --clean --skip=publish
        env:
          # Snapshots never push the formula, but goreleaser still
          # template-renders {{ .Env.HOMEBREW_TAP_GITHUB_TOKEN }} unless
          # the brews block is skipped. We pass an empty placeholder.
          HOMEBREW_TAP_GITHUB_TOKEN: dry-run-placeholder
