# crawl-e2e — end-to-end coverage at low TPS
#
# Purpose: exercise every product type and a representative ingest path
# variety so the wiring is proven before scaling up.
#
# Coverage: 4 tenants, 4 archetypes (one per product type), 3 ingest paths,
# 50 TPS, 5 minutes. No fault injection. Lifecycle off. Payments off.

schema_version: 1
name: crawl-e2e
description: One tenant per product type, three ingest paths, 5 minutes at 50 TPS.
target_tps: 50
duration: 5m
seed: 42

tenants:
  count: 4
  distribution: uniform
  archetypes:
    - name: crawl-api-postpaid-perunit
      weight: 0.25
      pricing_model: PER_UNIT
      billing_mode: POSTPAID
      product_types: [API]
      customer_count: 5
      currency_mix:
        USD: 1.0
      subscription_state_mix:
        ACTIVE: 1.0
      rate_config:
        per_unit_rate_usd: 0.001

    - name: crawl-aiagent-prepaid-flat
      weight: 0.25
      pricing_model: FLAT_RATE
      billing_mode: PREPAID
      product_types: [AI_AGENT]
      customer_count: 5
      currency_mix:
        USD: 1.0
      subscription_state_mix:
        ACTIVE: 1.0
      rate_config:
        flat_fee_usd: 99.00
        wallet_initial_balance_usd: 500.00

    - name: crawl-mcp-hybrid-quota
      weight: 0.25
      pricing_model: INCLUDED_QUOTA
      billing_mode: HYBRID
      product_types: [MCP_SERVER]
      customer_count: 5
      currency_mix:
        USD: 1.0
      subscription_state_mix:
        ACTIVE: 1.0
      rate_config:
        included_free_units: 1000
        per_unit_rate_usd: 0.005
        wallet_initial_balance_usd: 250.00

    - name: crawl-agentic-postpaid-graduated
      weight: 0.25
      pricing_model: GRADUATED
      billing_mode: POSTPAID
      product_types: [AGENTIC_API]
      customer_count: 5
      currency_mix:
        USD: 1.0
      subscription_state_mix:
        ACTIVE: 1.0
      rate_config:
        graduated_tiers:
          - up_to_units: 1000
            unit_price_usd: 0.010
          - up_to_units: 10000
            unit_price_usd: 0.007
          - up_to_units: 0  # 0 = unbounded last tier
            unit_price_usd: 0.005

time_pattern: constant

product_mix:
  API: 0.25
  AI_AGENT: 0.25
  MCP_SERVER: 0.25
  AGENTIC_API: 0.25

ingestion_paths:
  rest_direct: 0.5
  sdk_node: 0.3
  gateway_kong: 0.2

payload_variation:
  small_pct: 0.7
  medium_pct: 0.25
  large_pct: 0.05

tax:
  engine: mock

assertions:
  events_lost_max: 0
  invoice_revenue_drift_pct_max: 0.005
  p99_latency_ms_max: 800
  cross_tenant_leakage_max: 0
  per_archetype_billing_match: true
  stale_key_zero_false_positives: true

metadata:
  tier: crawl
  expected_total_events: 15000  # 50 TPS * 300s
