time_pattern: constant

product_mix:
  API: 0.40
  AI_AGENT: 0.20
  MCP_SERVER: 0.20
  AGENTIC_API: 0.20

ingestion_paths:
  rest_direct: 0.4
  sdk_node: 0.2
  sdk_python: 0.1
  gateway_kong: 0.1
  gateway_aws: 0.1
  gateway_azure: 0.1

payload_variation:
  small_pct: 0.7
  medium_pct: 0.25
  large_pct: 0.05

# Stale-key injection — allowed because several archetypes carry CANCELLED
# or EXPIRED states (mtx-flat-postpaid-cancelled, mtx-perunit-hybrid-stale,
# and others).
negative_paths:
  late_events_pct: 0.005
  malformed_pct: 0.001
  wrong_auth_pct: 0.001
  stale_keys_pct: 0.002

tax:
  engine: mock
  jurisdictions:
    US-CA: 0.0925
    EU-DE: 0.19
    GB: 0.20

assertions:
  events_lost_max: 0
  invoice_revenue_drift_pct_max: 0.005
  p99_latency_ms_max: 1200
  cross_tenant_leakage_max: 0
  per_archetype_billing_match: true
  stale_key_zero_false_positives: true

metadata:
  tier: matrix
  pricing_billing_combos_covered: 18
  variant_archetypes: 12
