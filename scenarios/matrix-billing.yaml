# matrix-billing — exhaustive 6×3 pricing×billing coverage
#
# Purpose: prove that every supported pricing model works correctly under
# every supported billing mode. The 18 base archetypes are the cartesian
# product (PER_UNIT, FLAT_RATE, PERCENTAGE, INCLUDED_QUOTA, GRADUATED,
# VOLUME_TIERED) × (POSTPAID, PREPAID, HYBRID). 12 additional variants
# stress different currency mixes, subscription state mixes (incl. stale
# CANCELLED/EXPIRED for stale-key fault injection), and discount mixes.
#
# 30 archetypes, weight distribution: 20 × 0.033 + 10 × 0.034 = 1.000.
#
# Coverage: 90 tenants, 30 archetypes, full ingest path mix, 1K TPS, 2h.
# Negative paths on at low rates incl. stale_keys (since several archetypes
# include CANCELLED/EXPIRED states). Lifecycle off (separate scenario).

schema_version: 1
name: matrix-billing
description: 30 archetypes covering every (pricing × billing) combination plus stale-state variants.
target_tps: 1000
duration: 2h
seed: 2026

tenants:
  count: 90
  distribution: uniform
  archetypes:
    # ---------- 18 base archetypes (6 pricing × 3 billing) ----------

    - name: mtx-perunit-postpaid
      weight: 0.034
      pricing_model: PER_UNIT
      billing_mode: POSTPAID
      product_types: [API]
      customer_count: 20
      currency_mix: { USD: 1.0 }
      subscription_state_mix: { ACTIVE: 1.0 }
      rate_config:
