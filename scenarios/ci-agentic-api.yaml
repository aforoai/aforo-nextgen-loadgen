# ci-agentic-api — AGENTIC_API coverage gate
#
# Purpose: prove the AGENTIC_API ingestion + billing path stays intact.
# Specifically guards against regressions in: usage-ingestor's top-level
# DTO field acceptance for endpointPath/httpMethod/statusCode/traceId
# (P0-6), BillingHierarchyEnricher's App→Team resolution (P1-10), and
# billing-service's per-endpoint dimension-pricing fan-out on both the
# v3 pipeline and the legacy path (P0-3/P0-4 — DimensionPricingParityTest
# is the unit-level version of this same guarantee).
#
# Added 2026-07-13 as part of the AGENTIC_API GA closeout. No CI wiring
# existed for this product type before this file — this is new coverage,
# not a rename of an existing scenario.
#
# Coverage: 1 tenant, 1 archetype (PER_UNIT POSTPAID AGENTIC_API), REST
# direct only, 100 TPS, 60s. No fault injection. No lifecycle. No payments.

schema_version: 1
name: ci-agentic-api
description: 60-second AGENTIC_API smoke test for CI. One tenant, REST direct, no faults.
target_tps: 100
duration: 60s
seed: 3

tenants:
  count: 1
  distribution: uniform
  archetypes:
    - name: ci-agentic-api-baseline
      weight: 1.0
      pricing_model: PER_UNIT
      billing_mode: POSTPAID
      product_types: [AGENTIC_API]
      customer_count: 5
      currency_mix:
        USD: 1.0
      subscription_state_mix:
        ACTIVE: 1.0
      rate_config:
        per_unit_rate_usd: 0.001

time_pattern: constant

product_mix:
  AGENTIC_API: 1.0

ingestion_paths:
  rest_direct: 1.0

payload_variation:
  small_pct: 1.0
  medium_pct: 0.0
  large_pct: 0.0

assertions:
  events_lost_max: 0
  invoice_revenue_drift_pct_max: 0.001
  p99_latency_ms_max: 500
  cross_tenant_leakage_max: 0
  per_archetype_billing_match: true
  stale_key_zero_false_positives: true

metadata:
  tier: ci
  notes: >
    Tied to the AGENTIC_API GA closeout (docs/final/111, per usage-ingestor-service's
    CLAUDE.md). A red run here means the top-level DTO field contract or the
    dimension-pricing fan-out changed. Does NOT cover gateway traceparent
    classification (P0-5) — that requires the gateway-plugin repos, which
    are not part of this workspace; see aforo-nextgen-analytics-service's
    docs/runbooks/2026-07-13-agentic-api-test-plan.md item 9 for that gap.
