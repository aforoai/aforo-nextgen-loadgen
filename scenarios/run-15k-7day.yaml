time_pattern: sine_24h

product_mix:
  API: 0.45
  AI_AGENT: 0.20
  MCP_SERVER: 0.20
  AGENTIC_API: 0.15

# Realistic mix across all 9 gateways + 4 SDKs + REST + webhook + CSV.
ingestion_paths:
  rest_direct: 0.30
  sdk_node: 0.10
  sdk_python: 0.10
  sdk_java: 0.05
  sdk_go: 0.05
  gateway_kong: 0.08
  gateway_apigee: 0.05
  gateway_aws: 0.05
  gateway_azure: 0.04
  gateway_mulesoft: 0.04
  gateway_apisix: 0.03
  gateway_tyk: 0.03
  gateway_gravitee: 0.02
  gateway_envoy: 0.02
  webhook_receiver: 0.03
  csv_upload: 0.01

payload_variation:
  small_pct: 0.7
  medium_pct: 0.25
  large_pct: 0.05

negative_paths:
  late_events_pct: 0.01
  future_events_pct: 0.001
  malformed_pct: 0.001
  wrong_auth_pct: 0.001
  stale_keys_pct: 0.001
  oversize_pct: 0.0001

lifecycle:
  enabled: true
  upgrades_per_hour_pct: 0.02
  downgrades_per_hour_pct: 0.02
  pause_resume_per_hour_pct: 0.02
  trial_conversion_per_hour_pct: 0.05
  trial_cancel_per_hour_pct: 0.02
  migrate_per_hour_pct: 0.01
  retry_payment_per_hour_pct: 0.05

tax:
  engine: mock
  jurisdictions:
    US-CA: 0.0925
    US-NY: 0.08875
    EU-DE: 0.19
    EU-FR: 0.20
    GB: 0.20
    JP: 0.10

wallet:
  hold_expiry_audit: true

# Session 11 — chaos events through the week. Each event names the
# instance/cluster/host id by an SSM-targetable identifier; these are
# deliberately placeholders. The ops runbook walks through replacing
# them with the real per-environment IDs before launching the run.
#
# Reversibility: every chaos type ships with a Recovery callback that
# the scheduler invokes when the event's duration elapses (or the run
# aborts). See docs/chaos-engineering.md for the per-type contract.
chaos:
  enabled: true
  events:
    # Day 0 — early kill: producer retry + DLT routing under broker loss.
    - at: 1h
      duration: 30s
      type: kafka_kill
      params:
        instance_id: i-PERF-MSK-BROKER-1
        cluster_name: aforo-perf-msk
      notes: Primary MSK broker bounce. Expect Kafka producer retry/3x backoff and DLT routing.

    # Day 0 — cold-cache: BillingHierarchyEnricher + Kong policy cache rebuild.
    - at: 6h
      duration: 0s
      type: redis_flush
      params:
        bastion_instance_id: i-PERF-BASTION
        cache_endpoint: aforo-perf-redis.cache.amazonaws.com:6379
      notes: Mid-morning Redis flush. Confirms Redis L2 caches rebuild from PostgreSQL primary.

    # Day 1 — ClickHouse latency spike: writer back-pressure + AnalyticsQueryRouter PG fallback.
    - at: 24h
      duration: 5m
      type: ch_slowdown
      params:
        instance_id: i-PERF-CLICKHOUSE-1
        latency_ms: 500
      notes: ClickHouse +500ms net delay. Expect circuit breaker trip + fallback reads.

    # Day 3 — service-to-service partition: cross-service breaker test.
    - at: 72h
      duration: 2m
      type: net_partition
      params:
        source_instance_id: i-PERF-BILLING-PLATFORM
        dest_ip: 10.0.42.10        # customer-service primary
        source_service_name: billing-platform
        dest_service_name: customer-service
      notes: Drop traffic from billing-platform → customer-service for 2 minutes.

assertions:
  events_lost_max: 0
  invoice_revenue_drift_pct_max: 0.005
  p99_latency_ms_max: 1500
  per_tenant_p99_fairness_max_stddev_pct: 0.25
  redis_cache_hit_ratio_min: 0.90
  cross_tenant_leakage_max: 0
  per_archetype_billing_match: true
  stale_key_zero_false_positives: true

metadata:
  tier: run
  notes: Headline endurance run. Pin a release here only after this passes.
