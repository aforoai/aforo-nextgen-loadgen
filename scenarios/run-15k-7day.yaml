# run-15k-7day — full-scale endurance run
#
# Purpose: prove the platform sustains the headline target (15K TPS) for a
# full week across 500 tenants without degradation. This is the
# acceptance-test profile.
#
# Coverage: 500 tenants, 12 archetypes, all 4 product types, all 6 pricing
# models, all 3 billing modes, full ingest path mix incl. all 9 gateways,
# 15K TPS, 7d. Sine-24h. Light fault injection. Lifecycle on at low rate.
# Payments off in this baseline (toggle on for end-to-end revenue runs).

schema_version: 1
name: run-15k-7day
description: 500 tenants, 12 archetypes, 15K TPS for 7 days. The headline endurance run.
target_tps: 15000
duration: 168h
seed: 1729

tenants:
  count: 500
  distribution: pareto_80_20
  archetypes:
    - name: run-api-postpaid-perunit
      weight: 0.15
      pricing_model: PER_UNIT
      billing_mode: POSTPAID
      product_types: [API]
      customer_count: 200
      currency_mix:
        USD: 0.6
        EUR: 0.2
        GBP: 0.1
        JPY: 0.1
      subscription_state_mix:
        ACTIVE: 0.80
        TRIALING: 0.05
        PAUSED: 0.03
        PAST_DUE: 0.05
        EXPIRING_SOON: 0.02
        CANCELLED: 0.03
        EXPIRED: 0.02
      discount_mix:
        none: 0.6
        pct_10: 0.25
        fixed_50: 0.15
      rate_config:
        per_unit_rate_usd: 0.001

    - name: run-api-prepaid-flat
      weight: 0.10
      pricing_model: FLAT_RATE
      billing_mode: PREPAID
      product_types: [API]
      customer_count: 150
      currency_mix:
        USD: 0.7
        EUR: 0.3
      subscription_state_mix:
        ACTIVE: 0.90
        TRIALING: 0.05
        CANCELLED: 0.05
      rate_config:
        flat_fee_usd: 199.00
        wallet_initial_balance_usd: 1500.00

    - name: run-api-hybrid-quota
      weight: 0.10
      pricing_model: INCLUDED_QUOTA
      billing_mode: HYBRID
      product_types: [API]
      customer_count: 120
      currency_mix:
