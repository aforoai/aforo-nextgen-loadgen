# ci-ai-agent-rest — AI_AGENT end-to-end coverage via the ingest REST path
#
# Purpose: exercise the descriptor-driven per-capability path that
# ci-smoke and the generic REST scenarios structurally cannot reach.
# Every event this scenario emits carries metadata.capability_name that
# ProductTypeEventExtractor.extractAiAgentFields bridges to
# event.toolName — the source of truth for per-capability dimension
# pricing (billing) and per-capability anomaly baselines
# (usage-ingestor + analytics).
#
# Wiring:
#   loadgen (ai_agent_rest driver) → usage-ingestor /v1/ingest
#   ─────────────────────────────────────────────────────────
#   The driver POSTs the standard IngestUsageEventRequest envelope with
#   productType=AI_AGENT and capability_name / agent_id / session_id /
#   execution_status / execution_duration_ms carried on metadata.
#   usage-ingestor's descriptor path picks capability_name up and stamps
#   it as event.toolName so downstream billing + analytics stay honest.
#
# Setup:
#   export AFORO_LOADGEN_INGEST_URL=http://localhost:8084/v1/ingest
#     — or, to test against staging:
#   export AFORO_LOADGEN_INGEST_URL=https://usage-ingestor.aforo.ai/v1/ingest
#
# Coverage: 1 tenant, PER_UNIT POSTPAID AI_AGENT, ai_agent_rest only,
# 50 TPS, 60s, no faults, no lifecycle.

schema_version: 2
name: ci-ai-agent-rest
description: 60-second AI_AGENT smoke covering the descriptor-driven per-capability ingest path.
target_tps: 50
duration: 60s
seed: 4

tenants:
  count: 1
  distribution: uniform
  archetypes:
    - name: ci-ai-agent-rest-baseline
      weight: 1.0
      pricing_model: PER_UNIT
      billing_mode: POSTPAID
      product_types: [AI_AGENT]
      customer_count: 5
      currency_mix:
        USD: 1.0
      subscription_state_mix:
        ACTIVE: 1.0
      rate_config:
        per_unit_rate_usd: 0.001

time_pattern: constant

product_mix:
  AI_AGENT: 1.0

ingestion_paths:
  ai_agent_rest: 1.0

payload_variation:
  small_pct: 1.0
  medium_pct: 0.0
  large_pct: 0.0

assertions:
  events_lost_max: 0
  invoice_revenue_drift_pct_max: 0.001
  p99_latency_ms_max: 750
  cross_tenant_leakage_max: 0
  per_archetype_billing_match: true
  stale_key_zero_false_positives: true

metadata:
  tier: ci
  notes: |
    Requires AFORO_LOADGEN_INGEST_URL to point at a running usage-ingestor
    (local: http://localhost:8084/v1/ingest; staging: usage-ingestor.aforo.ai).
    A failing run signals a regression in the AI_AGENT descriptor path —
    typically capability_name → toolName bridge in
    ProductTypeEventExtractor.extractAiAgentFields, or the shared
    dimension-pricing arithmetic that both v3 pipeline and legacy path
    key on. Companion to ci-mcp-jsonrpc.yaml which covers the MCP tools/call
    detection path.
